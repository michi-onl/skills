# rules.yaml – Wikipedia conversion rules (English ↔ German)
#
# This file is the single source of truth for all wikitext syntax conversions.
# Claude reads this file at the start of every conversion task and applies the
# rules manually. For de→en, swap keys and values.
#
# To add a new rule: find the right section, add the mapping, and optionally
# add a comment with the date if the mapping is non-obvious.

# =============================================================================
# TEMPLATE MAPPINGS
# =============================================================================

templates:
  # Simple 1:1 name replacements
  simple:
    "Steady": "Unverändert"
    "Up": "Gestiegen"
    "Down": "Gefallen"
    "Increase": "Gestiegen"
    "Decrease": "Gefallen"
    "Main": "Hauptartikel"
    "See also": "Siehe auch"
    "Official website": ""  # Remove – URL belongs in infobox or Weblinks section

  # Templates to remove entirely (no dewiki equivalent)
  remove:
    - "Short description"
    - "Use mdy dates"
    - "Use dmy dates"
    - "Use American English"
    - "Use British English"
    - "Refimprove"
    - "More citations needed"
    - "Dynamic list"
    - "pp-semi-indef"
    - "pp-semi"
    - "pp-move"
    - "pp-sock"
    - "Multiple image"
    - "further"
    - "Good article"
    - "Featured article"

  # Infobox name mappings
  infoboxes:
    "Infobox company": "Infobox Unternehmen"
    "Infobox person": "Infobox Person"
    "Infobox settlement": "Infobox Ort"
    "Infobox album": "Infobox Album"
    "Infobox single": "Infobox Single"
    "Infobox film": "Infobox Film"
    "Infobox television": "Infobox Fernsehsendung"
    "Infobox software": "Infobox Software"
    "Infobox organization": "Infobox Organisation"
    "Infobox university": "Infobox Hochschule"
    "Infobox book": "Infobox Buch"
    "Infobox musical artist": "Infobox Musiker"
    "Infobox football biography": "Infobox Fußballspieler"

