# =============================================================================
# DATE FORMATTING
# =============================================================================

date_formatting:
  months:
    "January": "Januar"
    "February": "Februar"
    "March": "März"
    "April": "April"
    "May": "Mai"
    "June": "Juni"
    "July": "Juli"
    "August": "August"
    "September": "September"
    "October": "Oktober"
    "November": "November"
    "December": "Dezember"

  # Convert MDY to DMY: "December 3, 2019" → "3. Dezember 2019"
  mdy_to_dmy: true

  # "As of January 2026" → "Stand Januar 2026"
  as_of_pattern:
    en: "As of"
    de: "Stand"

  # Dates in citation parameters (access-date, date) should be converted to
  # ISO format (YYYY-MM-DD) regardless of input format.
  cite_dates_to_iso: true

# =============================================================================
# NUMBER FORMATTING
# =============================================================================

number_format:
  # Decimal separator: en uses period, de uses comma
  decimal_separator:
    en: "."
    de: ","

  # Thousands separator: en uses comma, de uses period
  thousands_separator:
    en: ","
    de: "."

  # Scale words — CAREFUL, these are false friends!
  scale_words:
    "trillion": "Billion"       # 10^12
    "billion": "Milliarde"      # 10^9
    "million": "Million"        # 10^6
    "thousand": "Tausend"       # 10^3

  # Contexts to EXCLUDE from number format conversion:
  # - URLs (anything after ://)
  # - ISO dates (YYYY-MM-DD)
  # - Version numbers (e.g. 3.12, 17.4)
  # - DOIs, ISBNs, ISSNs
  # - Template parameters: url=, abruf=, datum=, doi=, isbn=

# =============================================================================
# SPECIAL TEMPLATES
# =============================================================================

special_templates:
  # {{abbr|L|left}} → L (extract first parameter, discard tooltip)
  "abbr":
    action: "extract_first"

  # {{URL|https://...|text}} → [https://... text]
  "URL":
    action: "convert_to_extlink"

  # {{Unbulleted list|item1|item2}} → item1<br>item2
  "Unbulleted list":
    action: "join_with_br"

  # {{hlist|item1|item2}} → item1, item2
  "hlist":
    action: "join_with_comma"

  # {{plainlist|...}} → convert to normal list
  "plainlist":
    action: "convert_to_list"

  # {{lang|fr|Bonjour}} → extract text, optionally wrap in italic
  "lang":
    action: "extract_second_param"

  # {{convert|5|mi|km}} → manual conversion needed
  "convert":
    action: "manual_conversion"

# =============================================================================
# TABLE SYNTAX
# =============================================================================

table_syntax:
  # Add German table classes
  class_additions:
    'class="wikitable sortable"': 'class="wikitable sortable tabelle-zaehler"'

  # Remove rank column rows (enwiki convention, not used in dewiki)
  remove_rank_rows: true

  # Status templates in tables
  status:
    "yes": "Ja"
    "no": "Nein"
    "Active": "Aktiv"
    "Discontinued": "Eingestellt"
    "Partial": "Teilweise"

# =============================================================================
# NAMESPACES
# =============================================================================

namespaces:
  "Category": "Kategorie"
  "File": "Datei"
  "Image": "Bild"
  "Template": "Vorlage"
  "Wikipedia": "Wikipedia"
  "Help": "Hilfe"
  "Portal": "Portal"
  "Draft": ""  # Drafts don't exist in dewiki

# =============================================================================
# MAGIC WORDS
# =============================================================================

magic_words:
  "DEFAULTSORT": "SORTIERUNG"
  "DISPLAYTITLE": "SEITENTITEL"

# =============================================================================
# IMAGE PARAMETERS
# =============================================================================

image_params:
  "thumb": "mini"
  "thumbnail": "mini"
  "right": "rechts"
  "left": "links"
  "center": "zentriert"
  "upright": "hochkant"
  "frame": "gerahmt"
  "frameless": "rahmenlos"
  "alt": "alternativtext"
  "border": "rand"

# =============================================================================
# TYPOGRAPHY
# =============================================================================

typography:
  # Quotation marks: English → German
  quotes:
    en_double: '""'       # or ""
    de_double: '„"'
    en_single: "''"
    de_single: '‚''

  # Dashes: em dash → en dash (dewiki uses Halbgeviertstrich)
  dashes:
    em_dash: "—"
    en_dash: "–"          # dewiki standard for Gedankenstrich

  # Non-breaking space before units
  # "10 km" → "10&nbsp;km"
  nbsp_before_units: true

# =============================================================================
# HATNOTE TEMPLATES
# =============================================================================

hatnote_templates:
  "Redirect": "Weiterleitungshinweis"
  "About": "Begriffsklärungshinweis"
  "See also": "Siehe auch"
  "Main": "Hauptartikel"
  "Further": "Weitere Informationen"
  "For": "Dieser Artikel"

# =============================================================================
# QUOTE TEMPLATES
# =============================================================================

quote_templates:
  # English blockquotes → German Zitat template
  # {{quote|text=...|source=...}} → {{Zitat|...|Quelle=...|Sprache=en|Übersetzung=...}}
  "quote":
    de_template: "Zitat"
    params:
      "text": ""           # First positional parameter
      "source": "Quelle"
      "Sprache": "en"      # Always add for English quotes
      "Übersetzung": ""    # Must be filled in during translation

  "blockquote":
    de_template: "Zitat"

# =============================================================================
# REFERENCE TEMPLATES
# =============================================================================

reference_templates:
  "reflist": "<references responsive />"
  "Reflist": "<references responsive />"
  "notelist": "<references group=\"Anm.\" responsive />"

# =============================================================================
# SISTER PROJECT TEMPLATES
# =============================================================================

sister_projects:
  "Commons category-inline": "Commonscat"
  "Commons-inline": "Commonscat"
  "Commons category": "Commonscat"
  "Commons": "Commonscat"
  "Authority control": "Normdaten"
  "Wikiquote": "Wikiquote"
  "Wiktionary": "Wiktionary"

# =============================================================================
# STYLE REPLACEMENTS
# =============================================================================

style_replacements:
  'style="text-align: center;"': 'align="center"'
  'style="text-align: left;"': 'align="left"'
  'style="text-align: right;"': 'align="right"'
