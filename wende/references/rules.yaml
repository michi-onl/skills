# =============================================================================
# CITATION TEMPLATES
# =============================================================================

cite_templates:
  # All these convert to Internetquelle
  to_internetquelle:
    - "cite web"
    - "cite news"
    - "cite magazine"
    - "cite journal"
    - "cite press release"
    - "cite report"
    - "Cite web"
    - "Cite news"
    - "Cite magazine"
    - "Cite journal"

  # Academic/book citations convert to Literatur
  to_literatur:
    - "cite book"
    - "cite arXiv"
    - "cite arxiv"
    - "cite encyclopedia"
    - "Cite book"

cite_params:
  internetquelle:
    "url": "url"
    "title": "titel"
    "date": "datum"
    "access-date": "abruf"
    "accessdate": "abruf"
    "website": "werk"
    "work": "werk"
    "newspaper": "werk"
    "magazine": "werk"
    "journal": "werk"
    "publisher": "hrsg"
    "author": "autor"
    "first": "vorname"
    "last": "nachname"
    "language": "sprache"
    "quote": "zitat"
    "pages": "seiten"

  # Remove these parameters entirely (no dewiki equivalent or not wanted)
  remove_params:
    - "archive-url"
    - "archive-date"
    - "url-status"
    - "url-access"
    - "via"
    - "issn"
    - "author-link"
